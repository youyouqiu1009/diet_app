<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダイエット記録</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f28c8f">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ダイエット記録">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<!-- JS/CSSを変更したら、下と末尾のscriptの ?v= の数字をすべて+1してからpushする -->
<link rel="stylesheet" href="style.css?v=4">
</head>
<body>

<header>
  <h1>ダイエット記録</h1>
  <button id="signout-button" class="hidden">ログアウト</button>
</header>

<main>

  <section id="login-card" class="card">
    <h2>ログイン</h2>
    <form id="login-form">
      <label>
        メールアドレス
        <input type="email" id="login-email" required>
      </label>
      <button type="submit">コードを送る</button>
    </form>
    <p id="login-message"></p>

    <form id="login-code-form" class="hidden">
      <label>
        メールに届いたコード
        <input type="text" id="login-code" inputmode="numeric" autocomplete="one-time-code" maxlength="10" required>
      </label>
      <button type="submit">コードでログイン</button>
    </form>
    <p id="login-code-message" class="message"></p>
    <p class="hint">※ メールに書かれたコードをここに入力するとログインできます（リンクをタップする方式より確実です）。</p>
  </section>

  <div id="app-content" class="hidden">

    <div class="tab-nav">
      <button type="button" class="tab-btn active" data-tab="calorie">カロリー</button>
      <button type="button" class="tab-btn" data-tab="weight">体重</button>
      <button type="button" class="tab-btn" data-tab="progress">進捗</button>
      <button type="button" class="tab-btn" data-tab="settings">設定</button>
    </div>

    <div id="tab-calorie" class="tab-panel">

      <section class="card">
        <h2>カロリー記録</h2>
        <form id="calorie-form">
          <label>
            日時
            <input type="datetime-local" id="calorie-datetime" required>
          </label>
          <label>
            カロリー (kcal)
            <input type="number" id="calorie-amount" step="1" required>
          </label>
          <label>
            メモ
            <input type="text" id="calorie-memo">
          </label>
          <button type="submit">記録する</button>
        </form>
        <p id="calorie-status-message" class="message"></p>
      </section>

      <section class="card">
        <h2><span id="calorie-list-date-label">今日</span>の合計: <span id="calorie-today-total">0</span> kcal</h2>
        <p>目標達成ライン: <strong id="goal-hint">-</strong></p>
        <p>現状維持ライン: <strong id="maintain-hint">-</strong></p>
        <ul id="calorie-today-list" class="record-list"></ul>
        <button type="button" id="calorie-history-btn" class="small-btn">過去の記録をすべて見る</button>
      </section>

    </div>

    <div id="tab-weight" class="tab-panel hidden">

      <section class="card">
        <h2>今日の記録</h2>
        <form id="record-form">
          <label>
            日付
            <input type="date" id="date" required>
          </label>
          <label>
            体重 (kg)
            <input type="number" id="weight" step="0.1">
          </label>
          <button type="submit">保存する</button>
        </form>
        <p id="status-message" class="message"></p>
      </section>

      <section class="card">
        <h2>体重の推移</h2>
        <div class="range-buttons">
          <button type="button" class="range-btn" data-range="7">1週間</button>
          <button type="button" class="range-btn" data-range="14">2週間</button>
          <button type="button" class="range-btn active" data-range="30">1か月</button>
          <button type="button" class="range-btn" data-range="90">3か月</button>
        </div>
        <canvas id="weight-chart"></canvas>
        <button type="button" id="weight-history-btn" class="small-btn">過去の記録をすべて見る</button>
      </section>

    </div>

    <div id="tab-settings" class="tab-panel hidden">

      <section class="card">
        <h2>設定</h2>
        <form id="settings-form">
          <label>
            性別
            <select id="setting-gender">
              <option value="male">男性</option>
              <option value="female">女性</option>
            </select>
          </label>
          <label>
            生年月日
            <input type="date" id="setting-birth-date">
          </label>
          <label>
            身長 (cm)
            <input type="number" id="setting-height" step="0.1">
          </label>
          <label>
            活動量
            <select id="setting-activity-factor">
              <option value="1.2">ほとんど運動しない（デスクワーク中心・一日中室内）</option>
              <option value="1.375">軽い運動（週1〜3回の軽い運動や散歩）</option>
              <option value="1.55">中程度の運動（週3〜5回の運動）</option>
              <option value="1.725">激しい運動（ほぼ毎日の運動）</option>
              <option value="1.9">非常に激しい運動（毎日の激しい運動や肉体労働）</option>
            </select>
          </label>
          <label>
            目標体重 (kg)
            <input type="number" id="setting-goal-weight" step="0.1">
          </label>
          <label>
            目標日
            <input type="date" id="setting-goal-date">
          </label>
          <details>
            <summary>詳細設定</summary>
            <label>
              kcal/kg 定数
              <input type="number" id="setting-kcal-per-kg" step="1" value="7200">
            </label>
          </details>
          <button type="submit">設定を保存</button>
        </form>
        <p id="settings-message" class="message"></p>
      </section>

    </div>

    <div id="tab-progress" class="tab-panel hidden">

      <section class="card">
        <h2>現在の状態</h2>
        <p>1日の消費カロリー（基礎代謝×活動量）: <strong id="current-bmr">-</strong> kcal/日</p>
        <p>基準体重: <strong id="current-baseline">-</strong></p>
        <p>マイナスカロリーの総量: <strong id="total-deficit">-</strong> kcal</p>
      </section>

      <section class="card">
        <h2>目標達成度</h2>
        <div class="progress-chart-wrap">
          <canvas id="progress-chart" width="140" height="140"></canvas>
          <div class="progress-chart-label" id="progress-label">-</div>
        </div>
      </section>

    </div>

  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button type="button" id="modal-close-btn" class="small-btn">閉じる</button>
      </div>
      <ul id="modal-list" class="record-list"></ul>
    </div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="app.js?v=4"></script>
<script src="calorie.js?v=4"></script>
<script src="weight.js?v=4"></script>
</body>
</html>
